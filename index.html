<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Mesocratic Party Digital Voting Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #4374BA 0%, #6C3393 50%, #EE2C24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(90deg, #4374BA 0%, #6C3393 50%, #EE2C24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .domain {
            color: #333;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 30px;
        }
        
        .tagline {
            color: #6C3393;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 40px;
            font-style: italic;
        }
        
        .coming-soon {
            color: #4374BA;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .message {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, #4374BA 0%, #6C3393 50%, #EE2C24 100%);
            border-radius: 2px;
            margin: 30px auto;
            max-width: 200px;
        }
        
        .footer {
            margin-top: 40px;
            color: #888;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            
            .logo {
                font-size: 36px;
            }
            
            .domain {
                font-size: 20px;
            }
            
            .tagline {
                font-size: 22px;
            }
            
            .coming-soon {
                font-size: 28px;
            }
            
            .message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MESOCRATIC PARTY</div>
        <div class="domain">vote.mesocrats.org</div>
        <div class="tagline">Where America Meets.</div>
        
        <div class="accent-bar"></div>
        
        <div class="coming-soon">Coming Soon</div>
        <div class="message">
            Our digital voting platform is currently under construction. 
            We're building a secure, accessible space for civic engagement.
        </div>
        
        <div class="accent-bar"></div>
        
        <div class="footer">
            © 2024 Mesocratic Party. All rights reserved.
        </div>
    </div>
</body>
</html>
